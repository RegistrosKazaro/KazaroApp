name: Deploy to AWS EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /home/ec2-user/apps/KazaroApp
            git fetch origin
            git reset --hard origin/main
            cd server
            npm ci
            pm2 restart kazaro-server --update-env
            cd ../client
            npm ci
            VITE_API_URL=/api npm run build
            sudo rsync -a --delete dist/ /var/www/insumos/
            sudo chown -R nginx:nginx /var/www/insumos
            sudo chmod -R 755 /var/www/insumos
            sudo nginx -t && sudo systemctl reload nginx || true