name: Deploy to AWS EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /home/ec2-user/apps/KazaroApp
            git fetch origin
            git reset --hard origin/main
            bash /home/ec2-user/apps/KazaroApp/redeploy.sh